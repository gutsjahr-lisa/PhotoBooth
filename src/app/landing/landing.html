<div class="landing">
  <header class="booth-header">
    <h1 class="booth-title">PhotoBooth</h1>
  </header>

  <a
    class="landing-illustration-link"
    href="https://mysketchbooth.com/"
    target="_blank"
    rel="noopener noreferrer"
    title="Idee von mysketchbooth.com"
  >
    <img class="landing-illustration" src="PhotoBooth.svg" alt="PhotoBooth – Idee von mysketchbooth.com" />
  </a>

  <app-options
    class="landing-options"
    [(orientation)]="orientation"
    [(frame)]="frame"
    [(colorMode)]="colorMode"
  />

  <div class="landing-actions">
    <button class="start-button" type="button" (click)="startBooth()">take photos</button>

    @if (errorMessage()) {
      <p class="error-message" role="alert">{{ errorMessage() }}</p>
    }
  </div>
</div>
