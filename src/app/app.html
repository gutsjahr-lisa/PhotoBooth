<main class="booth">
  @switch (phase()) {
    @case ('landing') {
      <app-landing [errorMessage]="errorMessage()" (start)="onStart($event)" />
    }

    @case ('entering') {
      <app-entering />
    }

    @case ('capturing') {
      @if (stream(); as activeStream) {
        <app-capture [stream]="activeStream" [colorMode]="colorMode()" (finished)="onCaptured($event)" />
      }
    }

    @case ('result') {
      @if (collageCanvas(); as canvas) {
        <app-result [collage]="canvas" (restart)="onRestart()" />
      }
    }
  }
</main>
